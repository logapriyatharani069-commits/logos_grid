
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Images</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
    font-family: sans-serif;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(2, 200px);
    gap: 20px;
  }

  .img-box {
    width: 200px;
    height: 200px;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }

  .img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Different delays for each image */
  .img1 { animation-delay: 0s; }
  .img2 { animation-delay: 1s; }
  .img3 { animation-delay: 2s; }
  .img4 { animation-delay: 3s; }

  @keyframes float {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-20px);
    }
  }
</style>
</head>

<body>

<div class="container">

  </div>

  </div>

  <div class="img-box img4">

  </div>
</div>

</body>
</html>
